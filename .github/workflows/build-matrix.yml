name: Build Matrix

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release (example: v0.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare_release_tag:
    name: Prepare Release Tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve_tag.outputs.release_tag }}
      should_release: ${{ steps.resolve_tag.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve / Create Tag
        id: resolve_tag
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ github.event.inputs.release_tag }}"
          tag="$(echo "$tag" | tr -d '\r' | xargs)"
          if [[ -z "$tag" ]]; then
            echo "release_tag input is required"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag already exists on origin: $tag"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$tag"
            git push origin "$tag"
            echo "Created and pushed tag: $tag"
          fi

          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.name }})
    needs: prepare_release_tag
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: win-x64, target: x86_64-pc-windows-msvc, os: windows-latest, use_msvc: true }
          - { name: win-x86, target: i686-pc-windows-msvc, os: windows-latest, use_msvc: true }
          - { name: win-arm, target: aarch64-pc-windows-msvc, os: windows-latest, use_msvc: true, allow_failure: true }
          - { name: mac-x64, target: x86_64-apple-darwin, os: macos-14 }
          - { name: mac-arm, target: aarch64-apple-darwin, os: macos-14 }
          - { name: linux-x64, target: x86_64-unknown-linux-gnu.2.17, os: ubuntu-latest }
          - { name: linux-arm, target: aarch64-unknown-linux-gnu.2.17, os: ubuntu-latest, allow_failure: true }
          - { name: linux-x86, target: i686-unknown-linux-gnu.2.17, os: ubuntu-latest, allow_failure: true }
          - { name: android-arm, target: aarch64-linux-android, os: ubuntu-latest, use_ndk: true, allow_failure: true }
          - { name: android-v7, target: armv7-linux-androideabi, os: ubuntu-latest, use_ndk: true, allow_failure: true }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Target
        shell: pwsh
        run: |
          $pureTarget = "${{ matrix.target }}".Split(".")[0]
          rustup target add $pureTarget

      - name: Setup Zig
        if: ${{ !matrix.use_ndk && !matrix.use_msvc }}
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.0

      - name: Setup Android NDK
        if: ${{ matrix.use_ndk == true }}
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Install Tools
        shell: pwsh
        run: |
          if ("${{ matrix.use_ndk }}" -eq "true") {
            cargo install cargo-ndk --locked
          } elseif ("${{ matrix.use_msvc }}" -ne "true") {
            cargo install cargo-zigbuild --locked
          }

      - name: Build CLI and CAPI
        shell: pwsh
        env:
          RUSTFLAGS: -C strip=symbols -C link-arg=-s -C panic=abort
        run: |
          $target = "${{ matrix.target }}"
          $pureTarget = $target.Split(".")[0]

          if ("${{ matrix.use_msvc }}" -eq "true") {
            cargo build --release --target $pureTarget -p rua_cli --target-dir target
            cargo build --release --target $pureTarget -p rua_capi --target-dir target
          } elseif ("${{ matrix.use_ndk }}" -eq "true") {
            cargo ndk -t $pureTarget build --release -p rua_capi --target-dir target
          } else {
            cargo zigbuild --release --target $pureTarget -p rua_cli --target-dir target
            cargo zigbuild --release --target $pureTarget -p rua_capi --target-dir target
          }

      - name: Package Artifacts
        shell: pwsh
        run: |
          $cleanTarget = "${{ matrix.target }}".Replace(".2.17", "")
          $outDir = "target/$cleanTarget/release"
          $artifactDir = "dist/rua-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          if (Test-Path $outDir) {
            Get-ChildItem $outDir | ForEach-Object {
              if ($_.Name -in @("rua", "rua.exe")) {
                Copy-Item $_.FullName (Join-Path $artifactDir $_.Name) -Force
              }
            }
          }

          if (-not (Get-ChildItem $artifactDir -ErrorAction SilentlyContinue)) {
            throw "No packaged artifacts found for ${{ matrix.name }}"
          }

          Compress-Archive -Path "$artifactDir/*" -DestinationPath "dist/rua-${{ matrix.name }}.zip" -Force

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rua-${{ matrix.name }}
          path: dist/rua-${{ matrix.name }}.zip
          if-no-files-found: error

      - name: Upload Release Assets
        if: ${{ always() && needs.prepare_release_tag.outputs.should_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release_tag.outputs.release_tag }}
          files: dist/rua-${{ matrix.name }}.zip
